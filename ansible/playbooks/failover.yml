- hosts: "{{ target_replica }}"
  gather_facts: no

  tasks:

    - name: Trigger manual failover
      shell: redis-cli cluster failover
      register: failover_output

    - name: Show failover result
      debug:
        var: failover_output.stdout_lines

- hosts: redis-node-1
  gather_facts: no

  tasks:

    - name: Wait for cluster stabilization
      pause:
        seconds: 10

    - name: Verify cluster state
      shell: redis-cli cluster info | grep cluster_state | cut -d':' -f2
      register: cluster_state

    - name: Show cluster state
      debug:
        msg: "Cluster state after failover: {{ cluster_state.stdout }}"

    - name: Show cluster topology
      shell: redis-cli cluster nodes
      register: cluster_nodes

    - name: Print cluster topology
      debug:
        var: cluster_nodes.stdout_lines
