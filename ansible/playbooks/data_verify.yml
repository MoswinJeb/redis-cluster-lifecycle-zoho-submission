- hosts: redis-node-1
  gather_facts: no

  tasks:

    - name: Verify 1000 Redis keys
      shell: |
        missing=0
        mismatch=0

        for i in $(seq -w 1 1000); do
          key="key:$i"

          expected=$(echo -n "$key" | sha256sum | awk '{print $1}')

          actual=$(redis-cli -c -h 10.10.0.11 -p 6379 GET "$key")

          if [ -z "$actual" ]; then
            missing=$((missing+1))
          elif [ "$actual" != "$expected" ]; then
            mismatch=$((mismatch+1))
          fi
        done

        if [ "$missing" -eq 0 ] && [ "$mismatch" -eq 0 ]; then
          echo "PASS — 1000/1000 keys verified"
        else
          echo "FAIL — missing=$missing mismatch=$mismatch"
        fi
      register: verify_output

    - name: Print verification result
      debug:
        var: verify_output.stdout
