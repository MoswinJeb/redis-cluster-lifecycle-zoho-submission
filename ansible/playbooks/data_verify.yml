- hosts: redis-node-1
  gather_facts: no

  tasks:

    - name: Verify 1000 Redis keys
      shell: |
        pass_count=0
        fail_count=0

        for i in $(seq -w 1 1000); do

          key="key:$i"

          expected=$(echo -n "$key" | sha256sum | awk '{print $1}')

          actual=$(redis-cli -c GET "$key")

          if [ "$actual" = "$expected" ]; then
            pass_count=$((pass_count+1))
          else
            fail_count=$((fail_count+1))
          fi

        done

        if [ "$fail_count" -eq 0 ]; then
          echo "PASS — $pass_count/1000 keys verified"
          exit 0
        else
          echo "FAIL — verified=$pass_count failed=$fail_count"
          exit 1
        fi
      register: verify_output

    - name: Print verification result
      debug:
        var: verify_output.stdout
