- hosts: redis
  gather_facts: no

  tasks:

    - name: Verify all nodes reachable
      ping:

- hosts: redis-node-1
  gather_facts: no

  tasks:

    - name: Check cluster state
      shell: redis-cli cluster info | grep cluster_state | cut -d':' -f2
      register: cluster_state

    - name: Fail if cluster not healthy
      fail:
        msg: "Cluster state is not healthy"
      when: cluster_state.stdout != "ok"

    - name: Show cluster state
      debug:
        msg: "Cluster state verified: {{ cluster_state.stdout }}"

    - name: Verify deterministic Redis data
      shell: |
        missing=0
        mismatch=0

        for i in $(seq -w 1 1000); do

          key="key:$i"

          expected=$(echo -n "$key" | sha256sum | awk '{print $1}')

          actual=$(redis-cli -c -h 10.10.0.11 GET "$key")

          if [ -z "$actual" ]; then

            missing=$((missing+1))

          elif [ "$actual" != "$expected" ]; then

            mismatch=$((mismatch+1))

          fi

        done

        if [ "$missing" -eq 0 ] && [ "$mismatch" -eq 0 ]; then

          echo "PASS — 1000/1000 keys verified"

        else

          echo "FAIL — missing=$missing mismatch=$mismatch"
          exit 1

        fi
      register: verify_output

    - name: Show data verification result
      debug:
        var: verify_output.stdout

    - name: Get current Redis version
      shell: redis-server --version | awk '{print $3}' | cut -d'=' -f2
      register: redis_version

    - name: Show current Redis version
      debug:
        msg: "Current Redis version: {{ redis_version.stdout }}"

    - name: Show idempotent upgrade message
      debug:
        msg: "Cluster already running target version 7.2.6"
      when: redis_version.stdout == "7.2.6"
