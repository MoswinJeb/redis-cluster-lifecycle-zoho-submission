- hosts: redis-node-1
  gather_facts: no

  tasks:

    - name: Check cluster state
      shell: redis-cli cluster info | grep cluster_state | cut -d':' -f2
      register: cluster_state

    - name: Fail if cluster state is not ok
      fail:
        msg: "FAIL — cluster_state is not ok"
      when: cluster_state.stdout != "ok"

    - name: Show cluster state
      debug:
        msg: "PASS — cluster_state: ok"

    - name: Verify all 16384 slots covered
      shell: |
        redis-cli cluster nodes | grep master | awk '{for(i=9;i<=NF;i++) print $i}' \
        | awk -F- '
        BEGIN {count=0}
        {
          if ($1 ~ /^[0-9]+$/ && $2 ~ /^[0-9]+$/)
            count += ($2 - $1 + 1)
        }
        END {print count}'
      register: slot_total

    - name: Fail if slot coverage incomplete
      fail:
        msg: "FAIL — expected 16384 slots, found {{ slot_total.stdout }}"
      when: slot_total.stdout | int != 16384

    - name: Show slot coverage
      debug:
        msg: "PASS — all 16384 slots assigned"

    - name: Verify replica link health
      shell: |
        unhealthy=0

        for ip in 10.10.0.11 10.10.0.12 10.10.0.13 10.10.0.14 10.10.0.15 10.10.0.16
        do

          role=$(redis-cli -h $ip INFO replication | grep role | cut -d':' -f2 | tr -d '\r')

          if [ "$role" = "slave" ]; then

            status=$(redis-cli -h $ip INFO replication | grep master_link_status | cut -d':' -f2 | tr -d '\r')

            if [ "$status" != "up" ]; then
              unhealthy=$((unhealthy+1))
            fi

          fi

        done

        echo $unhealthy
      register: replica_health

    - name: Fail if replica links unhealthy
      fail:
        msg: "FAIL — one or more replica links unhealthy"
      when: replica_health.stdout | int != 0

    - name: Show replica health
      debug:
        msg: "PASS — all replica links healthy"

    - name: Collect Redis versions
      shell: |
        for ip in 10.10.0.11 10.10.0.12 10.10.0.13 10.10.0.14 10.10.0.15 10.10.0.16
        do
          redis-cli -h $ip INFO server | grep redis_version | cut -d':' -f2
        done | sort | uniq
      register: versions

    - name: Fail if versions inconsistent
      fail:
        msg: "FAIL — Redis versions inconsistent across cluster"
      when: versions.stdout_lines | length != 1

    - name: Show version consistency
      debug:
        msg: "PASS — all nodes running Redis {{ versions.stdout }}"

    - name: Verify deterministic Redis data integrity
      shell: |
        missing=0
        mismatch=0

        for i in $(seq -w 1 1000)
        do

          key="key:$i"

          expected=$(echo -n "$key" | sha256sum | awk '{print $1}')

          actual=$(redis-cli -c -h 10.10.0.11 GET "$key")

          if [ -z "$actual" ]; then

            missing=$((missing+1))

          elif [ "$actual" != "$expected" ]; then

            mismatch=$((mismatch+1))

          fi

        done

        if [ "$missing" -eq 0 ] && [ "$mismatch" -eq 0 ]; then

          echo "PASS — 1000/1000 keys verified"

        else

          echo "FAIL — missing=$missing mismatch=$mismatch"
          exit 1

        fi
      register: verify_result

    - name: Show data verification
      debug:
        var: verify_result.stdout

    - name: Final verification summary
      debug:
        msg: "FULL VERIFICATION COMPLETE"
