- hosts: "{{ target_node }}"
  gather_facts: no
  become: yes

  vars:
    target_version: "{{ redis_version }}"
    announce_ip: "{{ node_ip }}"

  tasks:

    - name: Stop Redis
      shell: pkill redis-server || true

    - name: Download Redis {{ target_version }}
      shell: |
        cd /tmp

        rm -rf redis-{{ target_version }}
        rm -f redis-{{ target_version }}.tar.gz

        wget http://download.redis.io/releases/redis-{{ target_version }}.tar.gz

        tar xzf redis-{{ target_version }}.tar.gz
      args:
        executable: /bin/bash

    - name: Build Redis {{ target_version }}
      shell: |
        cd /tmp/redis-{{ target_version }}

        make -j4
      args:
        executable: /bin/bash

    - name: Install Redis {{ target_version }}
      shell: |
        cd /tmp/redis-{{ target_version }}

        make install
      args:
        executable: /bin/bash

    - name: Restart Redis
      shell: |
        nohup redis-server \
          --port 6379 \
          --cluster-enabled yes \
          --cluster-config-file /var/lib/redis/nodes.conf \
          --cluster-node-timeout 5000 \
          --cluster-announce-ip {{ announce_ip }} \
          --cluster-announce-port 6379 \
          --cluster-announce-bus-port 16379 \
          --appendonly yes \
          --protected-mode no \
          --bind 0.0.0.0 \
          > /tmp/redis.log 2>&1 &
      args:
        executable: /bin/bash

    - name: Wait for Redis to start
      wait_for:
        host: "{{ announce_ip }}"
        port: 6379
        timeout: 30

    - name: Verify upgraded Redis version
      shell: redis-server --version | awk '{print $3}' | cut -d'=' -f2
      register: redis_version_output

    - name: Show upgraded version
      debug:
        msg: "Node upgraded to Redis {{ redis_version_output.stdout }}"

- hosts: redis-node-1
  gather_facts: no

  tasks:

    - name: Verify cluster state after upgrade
      shell: redis-cli cluster info | grep cluster_state | cut -d':' -f2
      register: cluster_state

    - name: Show cluster state
      debug:
        msg: "Cluster state after upgrade: {{ cluster_state.stdout }}"
