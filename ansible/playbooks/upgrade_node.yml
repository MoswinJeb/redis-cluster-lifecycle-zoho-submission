- hosts: "{{ target_node }}"
  become: yes
  gather_facts: no

  vars:
    redis_version: "{{ redis_version }}"

  tasks:

    - name: Check current Redis version
      shell: redis-server --version | awk '{print $3}' | cut -d'=' -f2
      register: current_version

    - name: Show current version
      debug:
        msg: "Current Redis version: {{ current_version.stdout }}"

    - name: Skip upgrade if already on target version
      debug:
        msg: "Node already running Redis {{ redis_version }}. Skipping upgrade."
      when: current_version.stdout == redis_version

    - name: End play if already upgraded
      meta: end_play
      when: current_version.stdout == redis_version

    - name: Stop Redis
      shell: pkill redis-server
      ignore_errors: yes

    - name: Download Redis {{ redis_version }}
      shell: |
        cd /tmp
        rm -rf redis-{{ redis_version }}
        rm -f redis-{{ redis_version }}.tar.gz

        wget -q http://download.redis.io/releases/redis-{{ redis_version }}.tar.gz

        tar xzf redis-{{ redis_version }}.tar.gz

    - name: Build Redis {{ redis_version }}
      shell: |
        cd /tmp/redis-{{ redis_version }}
        make

    - name: Install Redis {{ redis_version }}
      shell: |
        cd /tmp/redis-{{ redis_version }}
        make install

    - name: Restart Redis
      shell: |
        nohup redis-server \
          --port 6379 \
          --protected-mode no \
          --cluster-enabled yes \
          --cluster-config-file /var/lib/redis/nodes.conf \
          --cluster-node-timeout 5000 \
          --cluster-announce-ip {{ node_ip }} \
          --cluster-announce-port 6379 \
          --cluster-announce-bus-port 16379 \
          --appendonly yes \
          --bind 0.0.0.0 \
          > /tmp/redis.log 2>&1 &

    - name: Wait for Redis to start
      wait_for:
        host: "{{ node_ip }}"
        port: 6379
        timeout: 30

    - name: Verify upgraded Redis version
      shell: redis-server --version | awk '{print $3}' | cut -d'=' -f2
      register: upgraded_version

    - name: Show upgraded version
      debug:
        msg: "Node upgraded to Redis {{ upgraded_version.stdout }}"

- hosts: redis-node-1
  become: yes
  gather_facts: no

  tasks:

    - name: Verify cluster state after upgrade
      shell: redis-cli cluster info | grep cluster_state | cut -d':' -f2
      register: cluster_state

    - name: Fail if cluster unhealthy
      fail:
        msg: "Cluster state is not ok after upgrade"
      when: cluster_state.stdout != "ok"

    - name: Show cluster state
      debug:
        msg: "Cluster state after upgrade: {{ cluster_state.stdout }}"
