- name: Install Redis build dependencies
  apt:
    name:
      - build-essential
      - tcl
      - wget
      - tar
    state: present
    update_cache: yes
  become: yes

- name: Download Redis source
  get_url:
    url: "https://download.redis.io/releases/redis-{{ redis_version }}.tar.gz"
    dest: "/tmp/redis-{{ redis_version }}.tar.gz"

- name: Extract Redis source
  unarchive:
    src: "/tmp/redis-{{ redis_version }}.tar.gz"
    dest: /tmp/
    remote_src: yes

- name: Build Redis
  command: make
  args:
    chdir: "/tmp/redis-{{ redis_version }}"

- name: Install Redis
  command: make install
  args:
    chdir: "/tmp/redis-{{ redis_version }}"
  become: yes

- name: Create Redis data directory
  file:
    path: /var/lib/redis
    state: directory
    mode: '0755'
  become: yes

- name: Copy Redis configuration
  template:
    src: redis.conf.j2
    dest: /etc/redis.conf
  become: yes

- name: Start Redis server
  shell: |
    pkill redis-server || true

    nohup redis-server /etc/redis.conf \
      > /tmp/redis.log 2>&1 &
  become: yes
